
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>LaiLai - Vertical Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #0A0A0B;
            --apple-card: #1C1C1E;
            --apple-text: #F5F5F7;
            --apple-text-secondary: #86868B;
            --lailai-accent: #E11D48;
        }

        @font-face {
            font-family: 'LaiLai';
            src: local('-apple-system'), local('BlinkMacSystemFont'), local('SF Pro Text'), local('SF Pro Display'), local('Inter');
        }

        body {
            font-family: 'LaiLai', sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.015em;
            touch-action: manipulation;
        }

        .glass-nav {
            background: rgba(10, 10, 11, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .ios-notification {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -120%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 0; height: 0; }
        
        .premium-text {
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .animate-apple {
            animation: apple-fade 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes apple-fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scrollbar-custom::-webkit-scrollbar { width: 6px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "jsonwebtoken": "https://esm.sh/jsonwebtoken@^9.0.3",
    "stripe": "https://esm.sh/stripe@^20.3.1",
    "fluent-ffmpeg": "https://esm.sh/fluent-ffmpeg@^2.1.3",
    "util": "https://esm.sh/util@^0.12.5",
    "express": "https://esm.sh/express@^5.2.1"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
