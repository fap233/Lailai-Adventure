
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LaiLai - Professional Vertical Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliotecas de Produção -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #0A0A0B;
            --apple-card: #1C1C1E;
            --apple-text: #F5F5F7;
            --lailai-accent: #E11D48;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .glass-nav {
            background: rgba(10, 10, 11, 0.85);
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
        }
        .premium-text {
            background: linear-gradient(135deg, #fff 0%, #86868B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .skeleton {
            background: linear-gradient(90deg, #1C1C1E 25%, #2C2C2E 50%, #1C1C1E 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Prevenção de flicker em dispositivos Apple */
        .animate-apple {
            animation: apple-in 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes apple-in {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
<script type="importmap">
{

    "hls.js": "https://esm.sh/hls.js@1.5.7",

    "jsonwebtoken": "https://esm.sh/jsonwebtoken@^9.0.3",
    "stripe": "https://esm.sh/stripe@^20.3.1",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
